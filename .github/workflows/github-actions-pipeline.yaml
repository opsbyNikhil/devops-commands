name: Github-Actions

on:
  push:
    branches:
      - main

jobs:
  build:
    name: devops-commands-app
    runs-on:  self-hosted

    steps:
      - name: checkout
        uses: actions/checkout@v6
      
      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22
      
      - name: Verify Node Version
        run:  node -v

      - name: Install Dependencies
        run:  npm install
      
      - name: Build Application
        run:  npm run build

      - name: Sonar Cloud Scan
        uses:  SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}
            
      - name: Configure AWS Credentails
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-secret-access-id: ${{ secrets.AWS_SECRET_KEY_ID }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker image build
        run:  docker image build -t devops-cmd-app:v1.0 .
      
      - name: Docker Images
        run:  docker image ls
        
      - name: Tag Docker Image
        run:  |
          docker tag devops-cmd-app:v1.0 ${{ secrets.AWS_ECR_REPOSITORY }}:latest

      - name: Docker Image Push to Amazon ECR
        run:  |
          docker push ${{ secrets.AWS_ECR_REPOSITORY }}:latest